<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daň z bohatství: model výnosu</title>
<style>
  :root {
    --ink:#202124; --muted:#5f6368; --line:#e5e7eb; --bg:#ffffff; --panel:#f7f8fa;
    --blue:#004c7f; --tax:#6ec6ff; --revenue:#16a34a; --accent:#111827; --warn:#7c2d12;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:var(--ink); background:var(--bg); }
  .wrap { max-width:1220px; margin:0 auto; padding:34px 24px 60px; }
  h1 { font-size:34px; line-height:1.05; margin:0 0 22px; letter-spacing:-0.035em; }
  h2 { font-size:20px; margin:26px 0 12px; letter-spacing:-0.02em; }
  .lead { color:var(--muted); max-width:930px; margin:0 0 24px; font-size:15px; line-height:1.5; }
  .layout { display:grid; grid-template-columns:360px 1fr; gap:24px; align-items:start; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:18px; position:sticky; top:14px; }
  .panel h2 { font-size:15px; margin:0 0 12px; text-transform:uppercase; letter-spacing:.08em; color:#374151; }
  .group { margin:14px 0 18px; padding-bottom:14px; border-bottom:1px solid var(--line); }
  .group:last-child { border-bottom:0; padding-bottom:0; margin-bottom:0; }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 5px; }
  input, select { width:100%; padding:10px 11px; border:1px solid #d1d5db; border-radius:10px; background:#fff; font-size:14px; }
  .twocol { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .legend { display:flex; gap:18px; align-items:center; margin:16px 0 22px; color:var(--muted); font-size:14px; flex-wrap:wrap; }
  .legend span { display:inline-flex; align-items:center; gap:7px; }
  .dotkey { width:13px; height:13px; border-radius:999px; display:inline-block; background:var(--blue); }
  .taxkey { background:var(--tax); }
  .summary { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:20px; }
  .card { border:1px solid var(--line); border-radius:16px; padding:14px; background:#fff; }
  .card .k { color:var(--muted); font-size:12px; margin-bottom:4px; }
  .card .v { font-size:23px; font-weight:850; letter-spacing:-.025em; }
  .card .s { color:var(--muted); font-size:12px; margin-top:2px; }
  table { width:100%; border-collapse:separate; border-spacing:0; overflow:hidden; border:1px solid var(--line); border-radius:16px; background:#fff; }
  th, td { padding:12px 14px; border-bottom:1px solid var(--line); text-align:right; font-variant-numeric:tabular-nums; }
  th:first-child, td:first-child { text-align:left; }
  tr:last-child td { border-bottom:0; }
  th { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:#4b5563; background:#f9fafb; }
  .subhead td { background:#f7f8fa; font-weight:800; color:#374151; }
  .chart { margin-top:22px; }
  .scenario-switch { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; margin:0 0 12px; }
  .scenario-btn { border:1px solid var(--line); background:#fff; border-radius:18px; padding:16px 14px; text-align:left; cursor:pointer; min-height:112px; transition:.15s ease; }
  .scenario-btn:hover { border-color:#bfdbfe; }
  .scenario-btn.active { border-color:#60a5fa; box-shadow:0 0 0 3px #dbeafe inset; background:#f8fbff; }
  .scenario-btn b { display:block; font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:#374151; line-height:1.15; }
  .scenario-btn span { display:block; margin-top:7px; font-size:12px; color:var(--muted); line-height:1.28; }
  .scenario-btn .metric { color:#111827; font-weight:750; }
  .selected-yield { border:1px solid var(--line); border-radius:18px; overflow:hidden; background:#fff; margin-bottom:22px; }
  .selected-yield-head { padding:14px 16px; background:#f9fafb; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:16px; align-items:flex-start; }
  .selected-yield-head b { font-size:15px; text-transform:uppercase; letter-spacing:.08em; color:#374151; }
  .selected-yield-head span { display:block; color:var(--muted); font-size:12px; margin-top:3px; }
  .yield-cards { display:grid; grid-template-columns:1fr 1fr; gap:0; }
  .yield-card { padding:18px 16px; border-right:1px solid var(--line); }
  .yield-card:last-child { border-right:0; }
  .yield-card .k { color:var(--muted); font-size:13px; margin-bottom:4px; }
  .yield-card .v { font-size:28px; font-weight:850; letter-spacing:-.035em; }
  .yield-card .s { color:var(--muted); font-size:12px; margin-top:4px; }
  .person { display:grid; grid-template-columns:minmax(0,1fr) 52px 285px; gap:16px; align-items:center; margin:9px 0; width:100%; max-width:100%; }
  .avatar { width:52px; height:52px; border-radius:999px; background:#e8eef3; display:flex; align-items:center; justify-content:center; font-weight:850; color:#334155; font-size:15px; }
  .dots { display:grid; grid-template-columns:repeat(50, minmax(0,1fr)); gap:3px; width:100%; max-width:100%; align-content:start; }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--blue); justify-self:center; }
  .dot.tax { background:var(--tax); }
  .dot.revenue { background:var(--revenue); }
  .avatar.revenue { color:#166534; background:#dcfce7; }
  .meta { min-width:0; overflow:hidden; }
  .meta b { display:block; font-size:16px; line-height:1.15; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta span { display:block; color:var(--muted); font-size:12px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .note { margin-top:20px; color:var(--muted); font-size:12px; line-height:1.5; }
  .distrow { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
  .distcard { border:1px solid var(--line); background:#fff; border-radius:12px; padding:8px 8px 6px; min-width:0; }
  .distcard.active { border-color:#93c5fd; box-shadow:0 0 0 2px #dbeafe inset; }
  .distcard svg { width:100%; height:42px; display:block; }
  .distcard b { display:block; font-size:10px; line-height:1.15; color:#374151; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .distcard span { display:block; color:var(--muted); font-size:10px; margin-top:1px; }
  .pill { display:inline-block; border:1px solid var(--line); background:#fff; border-radius:999px; padding:3px 8px; font-size:12px; color:#4b5563; margin:2px 4px 2px 0; }

  .tax-schedule { margin-top:14px; border:1px solid var(--line); background:#fff; border-radius:12px; padding:10px 10px 8px; overflow:hidden; }
  .tax-schedule svg { width:100%; height:92px; display:block; }
  .tax-schedule .axis { stroke:#cbd5e1; stroke-width:1; }
  .tax-schedule .step { fill:none; stroke:#1f2937; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
  .tax-schedule .threshold { stroke:#93c5fd; stroke-width:1; stroke-dasharray:3 3; }
  .tax-schedule text { font-size:9px; fill:#6b7280; font-family:inherit; }
  .tax-schedule .rate-label { fill:#374151; font-weight:700; }
  a { color:#064f7f; }
  @media (max-width: 940px) {
    .layout { grid-template-columns:1fr; }
    .panel { position:static; }
    .summary { grid-template-columns:1fr 1fr; }
    .scenario-switch, .yield-cards { grid-template-columns:1fr; }
    .yield-card { border-right:0; border-bottom:1px solid var(--line); }
    .yield-card:last-child { border-bottom:0; }
    .person { grid-template-columns:minmax(0,1fr) 42px; gap:10px 14px; }
    .avatar { width:42px; height:42px; }
    .dots { grid-column:1 / -1; grid-row:1; }
    .avatar { grid-column:1; grid-row:2; justify-self:start; }
    .meta { grid-column:2; grid-row:2; }
  }
</style>
</head>

<div class="wrap">
  <h1>Majetková daň z aktiv: interaktivní model výnosu</h1>

      <h2>Nastavení</h2>

        </div>

    </aside>

    <main>

        <button class="scenario-btn active" type="button" data-scenario="aboveFirst">
          <b>Všichni nad<br>1. prahem</b>
          <span id="scenarioAboveFirstMeta">modelový dopočet</span>
        </button>
        <button class="scenario-btn" type="button" data-scenario="forbes100">
          <b>Forbes 100</b>
          <span id="scenarioForbesMeta">jmenný seznam Forbesu</span>
        </button>
      </div>

      <div class="selected-yield" id="selectedYield"></div>

      <div class="legend">
        <span><i class="dotkey"></i> 1 tečka = 1 miliarda Kč</span>
        <span><i class="dotkey taxkey"></i> modelovaná daň</span>
      </div>
      <div class="chart" id="chart"></div>

      <div class="note">
        Zdroje: Forbes <a href="https://forbes.cz/lists/nc26/">100 nejbohatších Čechů 2026</a>; UBS Global Wealth Databook 2023.
      </div>
    </main>
  </div>
</div>

: 37, "name": "Zdeněk Bakala", "wealth": 18}, {"rank": 38, "name": "Michal Zámec", "wealth": 18}, {"rank": 39, "name": "Tomáš Němec", "wealth": 17.5}, {"rank": 40, "name": "Ivo Lukačovič", "wealth": 17}, {"rank": 41, "name": "Petr Němec", "wealth": 17}, {"rank": 42, "name": "Marek Vašíček", "wealth": 16.8}, {"rank": 43, "name": "Otakar Šuffner", "wealth": 16.8}, {"rank": 44, "name": "Tomáš Čupr", "wealth": 16.2}, {"rank": 45, "name": "Jan Bednář", "wealth": 16}, {"rank": 46, "name": "Gerald Rausnitz", "wealth": 15}, {"rank": 47, "name": "Jaroslav Nosek", "wealth": 15}, {"rank": 48, "name": "Jiří Šimáně", "wealth": 14.1}, {"rank": 49, "name": "Jaromír Uhýrek", "wealth": 13.8}, {"rank": 50, "name": "Vasil Bobela", "wealth": 13.2}, {"rank": 51, "name": "Jan Dobrovský", "wealth": 13.2}, {"rank": 52, "name": "Petr Pudil", "wealth": 13.2}, {"rank": 53, "name": "Radim Passer", "wealth": 13.1}, {"rank": 54, "name": "Jitka Cechlová Komárková", "wealth": 13}, {"rank": 55, "name": "Ivo Valenta", "wealth": 12.7}, {"rank": 56, "name": "Jiří Dragoun", "wealth": 12.5}, {"rank": 57, "name": "Tomáš Krsek", "wealth": 12}, {"rank": 58, "name": "Jaroslav Beran", "wealth": 12}, {"rank": 59, "name": "Slavomír Pavlíček", "wealth": 11.7}, {"rank": 60, "name": "Zdeněk Pelc mladší s rodinou", "wealth": 11.6}, {"rank": 61, "name": "Evžen Korec", "wealth": 11.5}, {"rank": 62, "name": "Josef Mařinec", "wealth": 11.2}, {"rank": 63, "name": "Marek Španěl", "wealth": 10.9}, {"rank": 64, "name": "Martin Vohánka", "wealth": 10.5}, {"rank": 65, "name": "Lubomír Stoklásek", "wealth": 10.4}, {"rank": 66, "name": "František Fabičovic a Radka Prokopová", "wealth": 10.4}, {"rank": 67, "name": "Ivan Zach", "wealth": 10.4}, {"rank": 68, "name": "Kateřina Kratochvílová s rodinou", "wealth": 10.3}, {"rank": 69, "name": "Martin Moravec", "wealth": 10.1}, {"rank": 70, "name": "Miroslav Kurka s rodinou", "wealth": 9.5}, {"rank": 71, "name": "Zbyněk Frolík", "wealth": 9.1}, {"rank": 72, "name": "Dalibor Dědek", " const HNW30 = {
  count: 2270,
  thresholdUsdM: 30,
  articleThresholdCzkBn: 0.630
};

const UBS_MILLIONAIRES = {
  countAbove1mUsd: 77000,
  thresholdUsdM: 1
};

let activeScenario = 'aboveFirst';

function val(id) { return Number(document.getElementById(id).value || 0); }
function params() {
  const brackets = [
    {t: val('t1'), r: val('r1')/100},
    {t: val('t2'), r: val('r2')/100},
    {t: val('t3'), r: val('r3')/100},
    {t: val('t4'), r: val('r4')/100}
  ].sort((a,b) => a.t - b.t);
  return { brackets,
           usdczk: 21, unit: 1, minRate: val('minRate')/100, realRate: val('realRate')/100 };
}
function fmtBn(x) {
  if (!isFinite(x)) return "–";
  if (Math.abs(x) >= 1000) return (x/1000).toLocaleString('cs-CZ', {maximumFractionDigits:2}) + " bil. Kč";
  return x.toLocaleString('cs-CZ', {maximumFractionDigits:1}) + " mld. Kč";
}
function fmtNum(x) { return Math.round(x).toLocaleString('cs-CZ'); }
function taxOnWealth(w, p) {
  let tax = 0;
  let prevRate = 0;
  for (const b of p.brackets) {
    tax += Math.max(0, w - b.t) * (b.r - prevRate);
    prevRate = b.r;
  }
  return Math.max(0, tax);
}
function sumTax(arr, p) { return arr.reduce((s, w) => s + taxOnWealth(w, p), 0); }
function initials(name) { return name.split(/\s+/).filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase(); }


function impliedParetoAlpha(thresholdBn) {
  // Horní ocas je dopočten Paretovou křivkou mezi hranicí Forbes 100 a externě kotveným horním prahem.
  const w100 = forbes[forbes.length - 1].wealth;
  return Math.log(HNW30.count / forbes.length) / Math.log(w100 / thresholdBn);
}

function hnwSeries(thresholdBn) {
  // Konzistentní horní ocas: Forbes 100 jsou skutečná jmenná data, zbytek horního ocasu je modelový Pareto dopočet.
  const known = forbes.map(d => d.wealth).sort((a,b)=>b-a);
  const w100 = known[known.length - 1] || thresholdBn;
  const alpha = impliedParetoAlpha(thresholdBn);
  const out = known.slice();
  for (let rank = known.length + 1; rank <= HNW30.count; rank++) {
    out.push(w100 * Math.pow(rank / known.length, -1 / alpha));
  }
  return out.map(w => Math.max(w, thresholdBn)).sort((a,b)=>b-a);
}


function paretoAlphaBetweenCounts(nLow, nHigh, ratioHighToLow) {
  return Math.log(nLow / nHigh) / Math.log(ratioHighToLow);
}

function countAboveInMidTail(xBn, p) {
  const x1 = UBS_MILLIONAIRES.thresholdUsdM * p.usdczk / 1000;
  const x30 = HNW30.thresholdUsdM * p.usdczk / 1000;
  const alpha = paretoAlphaBetweenCounts(UBS_MILLIONAIRES.countAbove1mUsd, HNW30.count, x30 / x1);
  if (xBn <= x1) return UBS_MILLIONAIRES.countAbove1mUsd;
  if (xBn >= x30) return HNW30.count * Math.pow(xBn / x30, -alpha);
  return UBS_MILLIONAIRES.countAbove1mUsd * Math.pow(xBn / x1, -alpha);
}

function midTailCountBetween(lowBn, highBn, p) {
  const x1 = UBS_MILLIONAIRES.thresholdUsdM * p.usdczk / 1000;
  const x30 = HNW30.thresholdUsdM * p.usdczk / 1000;
  const low = Math.max(lowBn, x1);
  const high = Math.min(highBn, x30);
  if (high <= low) return 0;
  return countAboveInMidTail(low, p) - countAboveInMidTail(high, p);
}

function midTailWealthBetween(lowBn, highBn, p) {
  const x1 = UBS_MILLIONAIRES.thresholdUsdM * p.usdczk / 1000;
  const x30 = HNW30.thresholdUsdM * p.usdczk / 1000;
  const low = Math.max(lowBn, x1);
  const high = Math.min(highBn, x30);
  if (high <= low) return 0;
  const alpha = paretoAlphaBetweenCounts(UBS_MILLIONAIRES.countAbove1mUsd, HNW30.count, x30 / x1);
  const c = UBS_MILLIONAIRES.countAbove1mUsd * Math.pow(x1, alpha);
  if (Math.abs(alpha - 1) < 1e-9) return alpha * c * Math.log(high / low);
  return alpha * c * (Math.pow(high, 1 - alpha) - Math.pow(low, 1 - alpha)) / (1 - alpha);
}

function allAboveFirstThresholdStats(p, hnwWealths) {
  const thresholds = p.brackets.map(b => b.t).sort((a,b)=>a-b);
  const first = thresholds[0] || 0;
  const x1 = UBS_MILLIONAIRES.thresholdUsdM * p.usdczk / 1000;
  const x30 = HNW30.thresholdUsdM * p.usdczk / 1000;
  const low = Math.max(first, x1);

  const hnwFiltered = hnwWealths.filter(w => w >= low);
  const hnwCount = hnwFiltered.length;
  const hnwWealth = hnwFiltered.reduce((s,w)=>s+w,0);
  const midCount = low < x30 ? midTailCountBetween(low, x30, p) : 0;
  const midWealth = low < x30 ? midTailWealthBetween(low, x30, p) : 0;

  let gross = 0;
  let prevRate = 0;
  for (const b of p.brackets) {
    const incRate = b.r - prevRate;
    if (incRate !== 0) {
      const cutoff = Math.max(low, b.t);
      const hnwExcess = hnwFiltered.reduce((s,w)=>s+Math.max(0, w-b.t),0);
      let midExcess = 0;
      if (cutoff < x30) {
        const wealthAboveCutoff = midTailWealthBetween(cutoff, x30, p);
        const countAboveCutoff = midTailCountBetween(cutoff, x30, p);
        midExcess = wealthAboveCutoff - b.t * countAboveCutoff;
      }
      gross += incRate * (hnwExcess + midExcess);
    }
    prevRate = b.r;
  }

  return {count: Math.round(hnwCount + midCount), wealth: hnwWealth + midWealth, gross, threshold: first};
}

function fmtUnitLabel(unitBn) {
  if (unitBn >= 1) return `${unitBn.toLocaleString('cs-CZ', {maximumFractionDigits:2})} mld. Kč majetku`;
  return `${(unitBn*1000).toLocaleString('cs-CZ', {maximumFractionDigits:0})} mil. Kč majetku`;
}

function fmtTaxAmount(x) {
  if (!isFinite(x)) return "–";
  if (Math.abs(x) >= 1) return fmtBn(x);
  return (x * 1000).toLocaleString('cs-CZ', {maximumFractionDigits:0}) + " mil. Kč";
}

function renderChart(p, grossForbes) {
  const chart = document.getElementById('chart'); chart.innerHTML = '';
  const unit = Math.max(0.01, p.unit);
  const items = forbes.map(d => ({type:'person', sortValue:d.wealth, ...d}));
  items.sort((a,b) => b.sortValue - a.sortValue);

  items.forEach(d => {
    const row = document.createElement('div'); row.className = 'person';
    const av = document.createElement('div'); av.className = 'avatar';
    av.textContent = initials(d.name);
    const dots = document.createElement('div'); dots.className = 'dots';

    const tax = taxOnWealth(d.wealth, p);
    const wealthDots = Math.max(1, Math.round(d.wealth / unit));
    const taxDots = Math.min(wealthDots, Math.max(0, Math.round(tax / unit)));
    for (let i=0; i<wealthDots; i++) {
      const dot = document.createElement('i'); dot.className = 'dot' + (i >= wealthDots - taxDots ? ' tax' : '');
      dots.appendChild(dot);
    }
    const meta = document.createElement('div'); meta.className = 'meta';
    const effectiveRate = d.wealth > 0 ? tax / d.wealth * 100 : 0;
    meta.innerHTML = `<b>#${d.rank} ${d.name}</b><span>${fmtBn(d.wealth)} • daň ${fmtTaxAmount(tax)} (${effectiveRate.toLocaleString('cs-CZ', {minimumFractionDigits:1, maximumFractionDigits:1})} %)</span>`;
    row.appendChild(dots); row.appendChild(av); row.appendChild(meta);
    chart.appendChild(row);
  });
}

function rowHtml(label, vals) { return `<tr><td>${label}</td>${vals.map(v=>`<td>${fmtBn(v)}</td>`).join('')}</tr>`; }
function baseRow(label, count, wealth, gross, p, approximate=false) {
  const minEff = wealth > 0 ? gross * p.minRate / wealth * 100 : 0;
  const realEff = wealth > 0 ? gross * p.realRate / wealth * 100 : 0;
  const range = `${minEff.toLocaleString('cs-CZ', {maximumFractionDigits:2})}–${realEff.toLocaleString('cs-CZ', {maximumFractionDigits:2})} %`;
  const wealthLabel = approximate ? `cca ${fmtBn(wealth)}` : fmtBn(wealth);
  return `<tr><td>${label}</td><td>${fmtNum(count)}</td><td>${wealthLabel}</td><td>${fmtBn(gross)}</td><td>${range}</td></tr>`;
}

function syncCollectionSliders(changedId) {
  const minEl = document.getElementById('minRate');
  const realEl = document.getElementById('realRate');
  let minVal = Number(minEl.value || 0);
  let realVal = Number(realEl.value || 0);
  if (changedId === 'minRate' && minVal > realVal) {
    realVal = minVal;
    realEl.value = String(realVal);
  }
  if (changedId === 'realRate' && realVal < minVal) {
    minVal = realVal;
    minEl.value = String(minVal);
  }
  document.getElementById('minRateOut').textContent = minVal.toLocaleString('cs-CZ');
  document.getElementById('realRateOut').textContent = realVal.toLocaleString('cs-CZ');
}


function renderTaxSchedule(p) {
  const el = document.getElementById('taxSchedule');
  if (!el) return;
  const brackets = p.brackets.filter(b => isFinite(b.t) && b.t > 0 && isFinite(b.r));
  if (!brackets.length) { el.innerHTML = ''; return; }

  const minX = Math.max(0.01, Math.min(...brackets.map(b => b.t)) / 3);
  const maxX = Math.max(...brackets.map(b => b.t)) * 3;
  const maxRate = Math.max(0.01, ...brackets.map(b => b.r));
  const W = 320, H = 92;
  const m = {l:28, r:8, t:10, b:23};
  const innerW = W - m.l - m.r;
  const innerH = H - m.t - m.b;
  const logMin = Math.log10(minX);
  const logMax = Math.log10(maxX);
  const x = v => m.l + (Math.log10(Math.max(v, minX)) - logMin) / (logMax - logMin) * innerW;
  const y = r => m.t + innerH - (r / maxRate) * innerH;
  const fmtT = v => v >= 1 ? v.toLocaleString('cs-CZ', {maximumFractionDigits:0}) + ' mld.' : (v*1000).toLocaleString('cs-CZ', {maximumFractionDigits:0}) + ' mil.';

  const pts = [];
  let prevT = minX;
  let currentRate = 0;
  for (const b of brackets) {
    const bx = Math.min(Math.max(b.t, minX), maxX);
    pts.push([x(prevT), y(currentRate)]);
    pts.push([x(bx), y(currentRate)]);
    currentRate = b.r;
    pts.push([x(bx), y(currentRate)]);
    prevT = bx;
  }
  pts.push([x(maxX), y(currentRate)]);
  const d = pts.map((p,i)=>(i?'L':'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');

  const thresholdLines = brackets.map((b,i) => {
    const bx = x(b.t);
    const labelY = i % 2 === 0 ? H - 8 : H - 16;
    return `<line class="threshold" x1="${bx.toFixed(1)}" y1="${m.t}" x2="${bx.toFixed(1)}" y2="${m.t+innerH}"/>` +
           `<text x="${bx.toFixed(1)}" y="${labelY}" text-anchor="middle">${fmtT(b.t)}</text>`;
  }).join('');

  const rateLabels = brackets.map((b,i) => {
    const nextT = i + 1 < brackets.length ? brackets[i+1].t : maxX;
    const mid = Math.sqrt(Math.max(b.t, minX) * nextT);
    return `<text class="rate-label" x="${x(mid).toFixed(1)}" y="${(y(b.r)-4).toFixed(1)}" text-anchor="middle">${(b.r*100).toLocaleString('cs-CZ', {maximumFractionDigits:1})} %</text>`;
  }).join('');

  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Marginální sazba podle logaritmické osy bohatství">
    <line class="axis" x1="${m.l}" y1="${m.t+innerH}" x2="${W-m.r}" y2="${m.t+innerH}"/>
    <line class="axis" x1="${m.l}" y1="${m.t}" x2="${m.l}" y2="${m.t+innerH}"/>
    ${thresholdLines}
    <path class="step" d="${d}"/>
    ${rateLabels}
  </svg>`;
}


function scenarioLabel(key, aboveFirst) {
  const firstThresholdLabel = aboveFirst.threshold >= 1
    ? aboveFirst.threshold.toLocaleString('cs-CZ', {maximumFractionDigits:2}) + ' mld. Kč'
    : (aboveFirst.threshold*1000).toLocaleString('cs-CZ', {maximumFractionDigits:0}) + ' mil. Kč';
  if (key === 'aboveFirst') return 'Všichni nad 1. prahem (' + firstThresholdLabel + ')';
  return 'Forbes 100';
}

function renderSelectedYield(stats, p) {
  const el = document.getElementById('selectedYield');
  const label = scenarioLabel(activeScenario, stats.aboveFirst);
  const count = stats.selected.count;
  const wealth = stats.selected.wealth;
  const gross = stats.selected.gross;
  const minYield = gross * p.minRate;
  const realYield = gross * p.realRate;
  const minEff = wealth > 0 ? minYield / wealth * 100 : 0;
  const realEff = wealth > 0 ? realYield / wealth * 100 : 0;
  const approx = activeScenario === 'forbes100' ? '' : 'cca ';
  el.innerHTML = `
    <div class="yield-cards">
      <div class="yield-card">
        <div class="k">Minimální výnos (${(p.minRate*100).toLocaleString('cs-CZ')} % teoretické daně)</div>
        <div class="v">${fmtBn(minYield)}</div>
        <div class="s">efektivně ${minEff.toLocaleString('cs-CZ', {maximumFractionDigits:2})} % majetku ročně</div>
      </div>
      <div class="yield-card">
        <div class="k">Realistický výnos (${(p.realRate*100).toLocaleString('cs-CZ')} % teoretické daně)</div>
        <div class="v">${fmtBn(realYield)}</div>
        <div class="s">efektivně ${realEff.toLocaleString('cs-CZ', {maximumFractionDigits:2})} % majetku ročně</div>
      </div>
    </div>`;
}

function render(changedId) {
  syncCollectionSliders(changedId);
  const p = params();
  const forbesWealths = forbes.map(d => d.wealth);
  const forbesBase = forbesWealths.reduce((s,w)=>s+w,0);

  const threshold30Bn = HNW30.thresholdUsdM * p.usdczk / 1000;
  const hnwWealths = hnwSeries(threshold30Bn);
  const hnwTotal = hnwWealths.reduce((s,w)=>s+w,0);
  const grossForbes = sumTax(forbesWealths, p);
  const grossHnw = sumTax(hnwWealths, p);
  const aboveFirst = allAboveFirstThresholdStats(p, hnwWealths);

  const selectedMap = {
    aboveFirst: {count: aboveFirst.count, wealth: aboveFirst.wealth, gross: aboveFirst.gross},
    forbes100: {count: forbes.length, wealth: forbesBase, gross: grossForbes}
  };
  if (!selectedMap[activeScenario]) activeScenario = 'aboveFirst';
  document.querySelectorAll('.scenario-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.scenario === activeScenario));
  document.getElementById('scenarioAboveFirstMeta').innerHTML = `<span class="metric">${fmtNum(aboveFirst.count)} osob • cca ${fmtBn(aboveFirst.wealth)}</span><br>teoretická daň ${fmtBn(aboveFirst.gross)}`;
  document.getElementById('scenarioForbesMeta').innerHTML = `<span class="metric">${fmtNum(forbes.length)} osob • ${fmtBn(forbesBase)}</span><br>teoretická daň ${fmtBn(grossForbes)}`;
  renderSelectedYield({selected: selectedMap[activeScenario], aboveFirst}, p);

  renderTaxSchedule(p);
  renderChart(p, grossForbes);
}

document.querySelectorAll('.scenario-btn').forEach(btn => btn.addEventListener('click', () => { activeScenario = btn.dataset.scenario; render(); }));
document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', () => render(el.id)));
render();
</script>
